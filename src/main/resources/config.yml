# Настройки плагина ThreeXThreePickaxe
# После изменения файла выполните команду /3x3reload, чтобы применить
# изменения без перезапуска сервера.

# Блоки, которые НЕ ломаются "за компанию" при использовании кирки
# 3x3 / 5x5 / 9x9 — например, чтобы не сносить чужие сундуки или спавнеры.
blacklisted-blocks:
  - CHEST
  - TRAPPED_CHEST
  - FURNACE
  - BLAST_FURNACE
  - SMOKER
  - BARREL
  - SHULKER_BOX
  - ENDER_CHEST
  - SPAWNER
  - BEACON
  - BREWING_STAND
  - ENCHANTING_TABLE

# Допустимые размеры области добычи.
allowed-radii:
  - 3
  - 5
  - 9

# Звук, который проигрывается, когда кирка ломается от износа.
break-sound:
  enabled: true
  sound: ENTITY_ITEM_BREAK
  volume: 1.0
  pitch: 1.0

# Настройки защиты регионов WorldGuard.
# Кирка НЕ будет ломать блоки, которые находятся в регионе,
# если этого региона НЕТ в списке allowed-regions.
# Пустой список = кирка не ломает блоки ни в каком регионе.
# Используйте "*" чтобы разрешить все регионы (отключить защиту).
#
# Пример:
#   allowed-regions:
#     - mine_world      # конкретное имя региона
#     - mine_*          # все регионы, начинающиеся на "mine_"
#
# Сообщение показывается игроку ОДИН РАЗ за удар, если хотя бы один блок
# в радиусе попал в защищённый регион.
region:
  allowed-regions:
    - mine_*
  region-blocked-message: "&c&lНельзя! Тут регион!"
